baseURL = 'https://TimeHunter618.github.io/hugo-maid-dev'
locale = 'en'
title = 'Aries的研发手记'
theme = 'hugo-theme-reimu'

defaultContentLanguage = 'zh-CN'

[params]
author = 'Aries'
avatar = 'aries.png'
description = '愿世界和平 ✨'
share = ["weibo", "qq", "weixin", "twitter", "facebook"]

[params.subtitle]
text = '用代码编织理想，以技术探索无限可能'
[params.subtitle.typing]
enable = true
strings = [
  '用代码编织理想，以技术探索无限可能',
  '探索人工智能的边界',
  '记录技术成长的每一步',
  '分享知识，共同进步'
]
typeSpeed = 100
backSpeed = 50
backDelay = 2000
startDelay = 300
loop = true
shuffle = true
showCursor = true
cursorChar = '|'

[params.preloader]
enable = true
[params.preloader.text]
"zh-CN" = '用代码编织理想，以技术探索无限可能'
"zh-TW" = '用代碼編織理想，以技術探索無限可能'
en = 'Weave dreams with code, explore infinity with technology'
ja = 'コードで理想を紡ぎ、技術で無限を探索する'
[[params.menu]]
name = 'Home'
url = ''
[[params.menu]]
name = 'Projects'
url = 'projects'
[[params.menu]]
name = 'Tech Share'
url = 'archives'
[[params.menu]]
name = 'About'
url = 'about'
[[params.menu]]
name = 'Friend'
url = 'friend'

[params.triangle_badge]
enable = true
icon = 'github'
link = 'https://github.com/TimeHunter618/hugo-maid-dev'

[params.player]
position = 'before_sidebar'
disable_on_mobile = false

[params.player.aplayer]
enable = true
[params.player.aplayer.options]
fixed = true
autoplay = false
volume = 0.4
mutex = true
listFolded = true

[params.player.meting]
enable = true
[params.player.meting.options]
id = '2265921590'
server = 'netease'
type = 'playlist'

[params.pjax]
enable = true

[params.quicklink]
enable = true
timeout = 3000
priority = true

[params.pangu]
enable = true

[params.injector]
body_end = '''
<script>
  function updateThemeTooltip() {
    const btn = document.querySelector('.dark-mode-btn');
    if (!btn) return;
    const mode = localStorage.getItem('dark_mode') || 'auto';
    let tooltip = '';
    if (mode === 'true') {
      tooltip = '暗色模式';
    } else if (mode === 'false') {
      tooltip = '亮色模式';
    } else {
      tooltip = '跟随系统';
    }
    btn.setAttribute('title', tooltip);
    btn.setAttribute('aria-label', tooltip);
  }
  document.addEventListener('DOMContentLoaded', () => {
    updateThemeTooltip();
    const btn = document.querySelector('.dark-mode-btn');
    if (btn) {
      btn.addEventListener('click', () => {
        setTimeout(updateThemeTooltip, 100);
      });
    }
  });
</script>
'''

[languages]
[languages.en]
locale = 'en'
label = 'English'
weight = 2
[languages."zh-CN"]
locale = 'zh-CN'
label = '简体中文'
weight = 1
hasCJKLanguage = true
[languages."zh-CN".params]
[[languages."zh-CN".params.menu]]
name = '首页'
url = ''
[[languages."zh-CN".params.menu]]
name = '项目介绍'
url = 'projects'
[[languages."zh-CN".params.menu]]
name = '技术分享'
url = 'archives'
[[languages."zh-CN".params.menu]]
name = '关于'
url = 'about'
[[languages."zh-CN".params.menu]]
name = '友链'
url = 'friend'

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[markup.highlight]
guessSyntax = true
noClasses = false

[outputs]
home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
baseName = "algolia"
isPlainText = true
mediaType = "application/json"
notAlternative = true
